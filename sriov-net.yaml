apiVersion: "k8s.cni.cncf.io/v1"
kind: NetworkAttachmentDefinition
metadata:
  name: sriov-vpp
  annotations:
    k8s.v1.cni.cncf.io/resourceName: intel.com/mellanox_sriov
spec:
  config: '{
  "type": "macvlan",
  "cniVersion": "0.3.1",
  "master": "eth0",
  "mode": "bridge",
  "ipam": {
    "type": "host-local",
    "ranges": [
      [ {
        "subnet": "10.10.0.0/16",
        "rangeStart": "10.10.1.20",
        "rangeEnd": "10.10.1.50",
        "gateway": "10.10.0.254"
      } ]
    ]
  }
}'
