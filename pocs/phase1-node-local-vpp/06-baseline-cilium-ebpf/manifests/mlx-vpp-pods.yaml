apiVersion: v1
kind: Pod
metadata:
  name: mlx-vpp-node1
spec:
  hostNetwork: true
  hostPID: true
  nodeName: aks-mellanoxpool-95527814-vmss000003
  containers:
  - name: vpp
    image: ubuntu:22.04
    command: ["/bin/bash", "-lc", "ulimit -l unlimited && exec sleep infinity"]
    securityContext:
      privileged: true
    volumeMounts:
    - mountPath: /dev/hugepages
      name: hugepages
    - mountPath: /sys
      name: sys
    - mountPath: /dev
      name: dev
    - mountPath: /host
      name: host-root
    - mountPath: /run
      name: run
  volumes:
  - name: hugepages
    hostPath:
      path: /dev/hugepages
      type: DirectoryOrCreate
  - name: sys
    hostPath:
      path: /sys
  - name: dev
    hostPath:
      path: /dev
  - name: host-root
    hostPath:
      path: /
  - name: run
    emptyDir: {}
---
