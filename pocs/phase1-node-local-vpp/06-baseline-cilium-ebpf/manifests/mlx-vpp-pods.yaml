apiVersion: v1
kind: Pod
metadata:
  name: mlx-svc-a
  annotations:
    k8s.v1.cni.cncf.io/networks: '[{"name":"dp-lan","ips":["10.30.1.20/16"]}]'
spec:
  nodeSelector:
    kubernetes.io/hostname: aks-mellanoxpool-95527814-vmss000003
  containers:
  - name: tools
    image: ubuntu:22.04
    command: ["bash", "-c", "apt-get update -qq && apt-get install -y -qq iperf3 iputils-ping iproute2 ncat > /dev/null 2>&1; echo READY; sleep infinity"]
    securityContext:
      capabilities:
        add: ["NET_ADMIN"]
---
